<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envelope Budget App</title>
</head>
<body>
    <h1>Blueprint for Mission</h1>
    <h2>Budgeting App</h2>
    <p>Database Status: Check the browser console (F12).</p>

<script src="sqlite3.js"></script>

<script>
  // This waits for the file to be ready
  window.addEventListener('DOMContentLoaded', () => {
    console.log("Checking for SQLite library...");
    if (typeof sqlite3InitModule === 'function') {
        console.log("✅ Library found locally. Starting database.js...");
        const appScript = document.createElement('script');
        appScript.src = "database.js";
        document.body.appendChild(appScript);
    } else {
        console.error("❌ sqlite3.js was found, but sqlite3InitModule is missing.");
    }
  });
</script>
</body>
</html>
